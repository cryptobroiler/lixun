[package]
name = "lupa-plugin-bundle"
version.workspace = true
edition.workspace = true

[lib]
name = "lupa_plugin_bundle"
path = "src/lib.rs"

[features]
default = ["maildir", "thunderbird"]
maildir = ["dep:lupa-source-maildir"]
thunderbird = ["dep:lupa-source-thunderbird"]

[dependencies]
lupa-source-maildir = { path = "../lupa-source-maildir", optional = true }
lupa-source-thunderbird = { path = "../lupa-source-thunderbird", optional = true }
