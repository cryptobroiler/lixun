[package]
name = "lupa-source-thunderbird"
version.workspace = true
edition.workspace = true

[lib]
name = "lupa_source_thunderbird"
path = "src/lib.rs"

[dependencies]
lupa-core = { path = "../lupa-core" }
lupa-sources = { path = "../lupa-sources" }
lupa-extract = { path = "../lupa-extract" }
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
walkdir.workspace = true
toml = "0.8"
rusqlite = { version = "0.31", features = ["bundled"] }
mailparse = "0.15"
base64 = "0.22"
quoted_printable = "0.5"
mime_guess = "2"

[dev-dependencies]
tempfile.workspace = true
