[lib]
name = "lixun_source_thunderbird"
path = "src/lib.rs"

[dependencies]
lixun-core = { path = "../lixun-core" }
lixun-sources = { path = "../lixun-sources" }
lixun-extract = { path = "../lixun-extract" }
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
walkdir.workspace = true
toml = "0.8"
rusqlite = { version = "0.31", features = ["bundled"] }
mailparse = "0.15"
base64 = "0.22"
quoted_printable = "0.5"
