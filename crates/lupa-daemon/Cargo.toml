[package]
name = "lupa-daemon"
version = "0.1.0"
edition = "2024"

[dependencies]
lupa-core = { path = "../lupa-core" }
lupa-ipc = { path = "../lupa-ipc" }
lupa-index = { path = "../lupa-index" }
lupa-sources = { path = "../lupa-sources" }
anyhow = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
