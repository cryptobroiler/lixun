[package]
name = "lupa-daemon"
version.workspace = true
edition.workspace = true

[[bin]]
name = "lupad"
path = "src/main.rs"

[lib]
name = "lupa_daemon"
path = "src/lib.rs"

[dependencies]
lupa-core = { path = "../lupa-core" }
lupa-extract = { path = "../lupa-extract" }
lupa-ipc = { path = "../lupa-ipc" }
lupa-index = { path = "../lupa-index" }
lupa-sources = { path = "../lupa-sources" }
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
notify.workspace = true
bytes.workspace = true
rayon.workspace = true
dirs = "5"
toml = "0.8"
libc = "0.2"
signal-hook = "0.3"
signal-hook-tokio = { version = "0.3", features = ["futures-v0_3"] }
futures = "0.3"
ashpd = { version = "0.13", features = ["tokio", "global_shortcuts"] }

[dev-dependencies]
tempfile = "3"
