# Example configuration for lixun.
#
# Copy to ~/.config/lixun/config.toml and adjust to taste.
# Every section below is optional; missing fields fall back to defaults.

# Maximum file size to extract text from, in MiB.
# Files larger than this are still indexed by name/metadata.
max_file_size_mb = 50

# Hard timeout per extractor invocation (pdftotext, libreoffice, catdoc).
extractor_timeout_secs = 15

# Additional substring excludes. Matched against the full path.
# These are ADDED on top of the built-in defaults (.cache, .git, node_modules,
# target, .venv, __pycache__, .thunderbird, .swp, .swo, .swx, etc).
exclude = [
    # KDE/GNOME runtime state that changes every few seconds
    ".local/share/baloo",
    ".local/share/akonadi",
    ".local/share/kactivitymanagerd",
    ".local/share/klipper",
    ".local/share/RecentDocuments",
    ".local/share/Nextcloud",

    # Browser profiles - multi-GB caches, cookies, service workers
    ".mozilla",
    ".zen",
    ".config/google-chrome",
    ".config/chromium",
    ".config/BraveSoftware",
    ".config/vivaldi",

    # Electron app config (each ships its own Chromium cache)
    ".config/Code",
    ".config/VSCodium",
    ".config/Slack",
    ".config/discord",
    ".config/Bitwarden",
    ".config/obsidian",

    # Secret stores - do not index principally
    ".password-store",
    ".gnupg",
    ".ssh",

    # Nextcloud sync journals
    "Nextcloud/.sync_",

    # Git internals - pack objects are not useful for full-text search
    ".git/objects",
    ".git/lfs",

    # Build artifacts outside the default "target"
    "dist",
    "build",
    ".next",
    ".nuxt",
    ".svelte-kit",
    ".turbo",
    ".parcel-cache",
    ".gradle",
    ".mvn",
    "CMakeFiles",

    # Language package caches
    ".cargo/registry",
    ".rustup",
    ".bun",
    ".npm",
    ".yarn",
    ".pnpm",
    ".deno",
    ".pub-cache",
    ".m2/repository",
    ".nvm",
    ".rbenv",
    ".pyenv",
    ".poetry",
    "go/pkg/mod",

    # Container / VM runtime
    ".docker",
    ".podman",
    ".local/share/containers",
    ".vagrant.d",

    # Flatpak / Snap
    ".local/share/flatpak",
    "snap/",

    # IDE state
    ".idea",
    ".vscode",
    ".cursor",
    ".fleet",

    # Systemd / journal
    ".local/share/systemd",

    # Crash dumps
    ".xsession-errors",
    "core.",

    # Steam / gaming
    ".local/share/Steam",
    ".steampath",

    # Wine / Proton
    ".wine",
    ".PlayOnLinux",

    # Keyrings
    ".local/share/kwalletd",
    ".local/share/keyrings",

    # Thumbnails
    ".thumbnails",
]

# Regex-based excludes. Each pattern is matched against the full path string.
# Invalid patterns are logged at error level and dropped; the daemon keeps
# running with the valid ones.
exclude_regex = [
    # LibreOffice / Office lock files
    '\.~lock\..*#$',
    '~\$.*\.docx?$',
    '~\$.*\.xlsx?$',
    '~\$.*\.pptx?$',

    # Compiled / intermediate artifacts
    '\.pyc$',
    '\.pyo$',
    '\.class$',
    '\.o$',
    '\.obj$',
    '\.d$',
    '\.rlib$',
    '\.rmeta$',
    '\.a$',
    '\.so(\.\d+)*$',
    '\.dylib$',
    '\.dll$',
    '\.pdb$',

    # Minified / bundled output
    '\.min\.js$',
    '\.min\.css$',
    '\.bundle\.js$',
    '\.chunk\.js$',
    '\.map$',
    '\.tsbuildinfo$',

    # Rotated logs
    '\.log\.\d+(\.gz|\.bz2|\.xz)?$',
    '\.log\.gz$',

    # Backups / editor autosaves
    '\.bak$',
    '\.backup$',
    '\.old$',
    '\.orig$',
    '~$',
    '#.*#$',

    # Partial downloads / temp
    '\.crdownload$',
    '\.part$',
    '\.partial$',
    '\.tmp$',
    '\.temp$',
    '\.!qB$',

    # OS-level junk
    '/\.DS_Store$',
    '/Thumbs\.db$',
    '/desktop\.ini$',

    # SQLite journals (churn every second)
    '\.sqlite-wal$',
    '\.sqlite-shm$',
    '\.db-wal$',
    '\.db-shm$',
    '\.db-journal$',

    # Lock files (the filesystem primitive, not code)
    '/flock$',
    '/\.lock$',

    # Cargo target anywhere (stricter than the default "target" substring)
    '/target/(debug|release|tmp|doc|package)/',

    # Python tool state
    '\.egg-info/',
    '\.tox/',
    '\.pytest_cache/',
    '\.mypy_cache/',
    '\.ruff_cache/',

    # Jupyter checkpoints
    '/\.ipynb_checkpoints/',

    # Git pack-files
    '/\.git/objects/pack/',

    # Container image layers
    '/overlay2/',
    '/diff/',

    # File-sync version histories
    '/\.stversions/',
    '/\.sync/',

    # Large binary media (body is not extracted; names rarely searched)
    '\.(mp4|mkv|avi|mov|webm|flv|wmv)$',
    '\.(mp3|flac|ogg|m4a|opus|wav)$',
    '\.(iso|img|vmdk|qcow2|vdi)$',

    # Archives
    '\.(zip|tar\.gz|tar\.bz2|tar\.xz|tgz|tbz2|txz|7z|rar)$',

    # Fonts
    '\.(ttf|otf|woff|woff2|eot)$',
]

# Ranking weights: how much each source category is boosted in search scores.
[ranking]
apps = 1.3
files = 1.2
mail = 1.0
attachments = 0.9

# Title prefix match boost. Applied when normalized title starts with query.
prefix_boost = 1.4

# Acronym/initials boost using the D4 splitter (e.g. vsc -> Visual Studio Code).
acronym_boost = 1.25

# Recency bonus weight for File/Mail items based on document mtime.
recency_weight = 0.2

# Recency decay horizon in days. Larger values keep old edits boosted longer.
recency_tau_days = 30.0

# Frecency multiplier weight. Final mult = 1 + alpha * raw, where raw in [0, 10]
# is a bucket-weighted sum over recent clicks per doc. Set to 0.0 to disable.
frecency_alpha = 0.1

# Query-latch weight. Final mult = clamp(1 + latch_weight * ln(1+count) * recency,
# 1.0, latch_cap), where count is the number of times this exact (normalized)
# query has been clicked through to this doc. Word order matters.
latch_weight = 0.5

# Upper bound on the query-latch multiplier. Caps the reward for a single
# heavily-latched pair from dominating the ranking entirely.
latch_cap = 3.0

# Upper bound on the Stage-2 multiplier (frecency × latch). Prevents
# long-lived click history or extreme latch streaks from letting a
# single doc's score grow without bound across sessions. Applied after
# both Stage-2 multipliers have been computed but before the final
# sort. Not applied to Stage-1 signals (category × prefix × acronym ×
# recency), which are individually well-bounded by their own configs.
total_multiplier_cap = 6.0

# Top Hit (hero row) selection gates. A result is promoted to the hero
# slot only when both thresholds are met: confidence in {prefix/acronym
# match, strong latch, frecency dominance} >= min_confidence, AND the
# top-1 / top-2 score ratio >= min_margin. Raising either value makes
# the hero row appear less often; lowering them (e.g. min_margin=1.0)
# makes it appear whenever hits[0] would otherwise win anyway.
top_hit_min_confidence = 0.6
top_hit_min_margin = 1.3

# Keybindings - GTK accelerator syntax (<Ctrl>c, <Shift>Return, etc).
[keybindings]
close = "Escape"
primary_action = "Return"
secondary_action = "<Shift>Return"
copy = "<Ctrl>c"
quick_look = "space"
history_up = "Up"
next_result = "Down"
previous_result = "Up"
next_category = "<Ctrl>Down"
previous_category = "<Ctrl>Up"
filter_all = "<Ctrl>0"
filter_apps = "<Ctrl>1"
filter_files = "<Ctrl>2"
filter_mail = "<Ctrl>3"
filter_attachments = "<Ctrl>4"
#
# global_toggle values follow the XDG shortcuts specification:
# modifiers are CTRL, ALT, SHIFT, NUM, LOGO (joined with +), followed by an
# xkbcommon keysym name. Common aliases are accepted and normalized:
# Super/Meta/Win -> LOGO, Control -> CTRL. If KDE Plasma rejects your
# shortcut, write it in spec form: "LOGO+space".
global_toggle = "Super+space"

# ─── Preview (Quick-Look style panel) ─────────────────────────────────
#
# ============================================================
# Launcher window sizing
# ============================================================
#
# Width and height of the launcher overlay, expressed as a percentage
# of the monitor's geometry at show time. Values are clamped to
# [10, 95] — anything below 10% is unusable and 100% covers the entire
# screen with no breathing room.
#
# Defaults: 40% wide × 60% tall. A 1920×1080 monitor yields 768×648.
# CSS floors (.lixun-window min-width/min-height in the embedded
# stylesheet) kick in on pathologically tiny monitors, so setting low
# percentages on a big monitor is safe; setting them on a 10" monitor
# lands on the floor.
[gui]
# width_percent = 40
# height_percent = 60

# Absolute pixel caps. `min(percent * monitor, max_px)` wins —
# matches macOS Spotlight, which keeps the launcher ≈ 680 pt wide
# even on a 6K display. Defaults 900×800 for the launcher.
# max_width_px = 900
# max_height_px = 800

# Preview window percentages (separate from launcher — preview shows
# full documents and media, so 80/80 is a sensible default).
# preview_width_percent = 80
# preview_height_percent = 80

# Preview caps. Default 2000×1400 — Quick Look-style ceiling that
# stops preview from being unreadably large on big monitors.
# preview_max_width_px = 2000
# preview_max_height_px = 1400

# ============================================================
# Preview subsystem
# ============================================================
#
# Configures the preview subsystem. This section is parsed today by the
# daemon but is not yet wired to runtime behaviour; it is the stable
# schema preview plugins (code, image, pdf, office, email, A/V, text)
# will consume once they land (G2.8+ in the roadmap). You can set
# these values now; they will take effect as each plugin ships.
#
# All fields are optional. Section itself may be omitted; defaults apply.
[preview]
# Master switch. Reserved for G2.8+; consumed by the preview dispatcher
# once that lands. Setting it to false today has no runtime effect.
enabled = true

# Plugin id to force (e.g. "text", "image", "pdf") for every preview
# invocation, or "auto" to let the preview process choose based on
# MIME / extension. Stored verbatim by the daemon; unknown ids are
# rejected by the preview process at open time, not at config-load.
default_format = "auto"

# Upper bound on file size (MiB) the preview layer will render. Files
# larger than this show a "too large to preview" placeholder instead.
# This is INDEPENDENT from the top-level max_file_size_mb (which gates
# text extraction for indexing) and is intentionally larger, because
# rendering an image/PDF/video is routinely acceptable at sizes where
# full-text extraction would be wasteful.
max_file_size_mb = 200

# Directory for rendered thumbnails and cached preview artefacts.
# Default is XDG cache: ~/.cache/lixun/preview. Tilde is expanded.
# The directory is created on first use by the preview process, not
# at daemon startup.
# cache_dir = "~/.cache/lixun/preview"

# Per-plugin configuration lives under [preview.<plugin>] subtables.
# The daemon preserves these verbatim and passes them to each preview
# plugin, which knows its own schema. Examples (not yet wired; see
# .local/plans/gui-ux-v1-tier2-plugins.md for the full list):
#
# [preview.code]
# theme = "Solarized (light)"   # syntect theme name
#
# [preview.image]
# background = "#222222"        # matte behind transparent images

# ─── Maildir sources ──────────────────────────────────────────────────
#
# Presence of this section = plugin loaded. Omit to skip.
#
# Index messages from a maildir-format mail store (mutt/neomutt/notmuch/
# offlineimap/isync/fdm/etc.). Each [[maildir]] block is one instance —
# you can configure multiple if you have e.g. personal + work accounts
# in separate maildir roots.
#
# Triggers a full index wipe + rebuild the first time you add, remove,
# or change which maildir sources are enabled (schema fingerprint
# changes).
#
# Search with typed fields:
#   folder:INBOX
#   flags:seen
#   from:alice@example.com
#
# [[maildir]]
# id = "personal-mail"
# enabled = true
# paths = ["~/Mail"]
# # open_cmd placeholders: {folder}, {path}, {message_id}
# open_cmd = ["neomutt", "-f", "{folder}"]
#
# [[maildir]]
# id = "work-mail"
# enabled = true
# paths = ["~/.local/share/mail/work"]
# open_cmd = ["aerc", "mailto:{message_id}"]

# ─── Thunderbird source ───────────────────────────────────────────────
#
# Presence of this section = plugin loaded. Omit to skip.
#
# When the section is present and a Thunderbird profile can be located
# (either via the `profile` field below or by auto-detecting
# ~/.thunderbird/), Lixun registers two source instances:
# builtin:gloda (SQLite messages: subject, sender, recipients, body
# snippet) and builtin:tb_attachments (mbox-level attachment text).
#
# [thunderbird]
# enabled = true
#
# # Override auto-detection (useful if you have multiple profiles and
# # the default one isn't what you want Lixun to index). Must be the
# # full profile dir containing global-messages-db.sqlite and Mail/.
# # If the path does not exist, the plugin logs a warn and registers
# # no sources — the rest of the daemon continues to run.
# # profile = "~/.thunderbird/work.default-release"
#
# # How many gloda messages to ingest per 30s tick. Default 250.
# # Raise to ~1000 on very large mailboxes if initial catch-up is slow;
# # lower if you want to cap per-tick I/O more aggressively.
# # gloda_batch_size = 250
#
# # Index mbox attachment content (PDFs, docs inside .eml). Disable if
# # your mailbox is huge and search across attachment bodies isn't worth
# # the disk I/O; gloda message search continues to work either way.
# # attachments = true
